name: OnePlus Ace 5 Ultra Pure Build
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1️⃣ 环境初始化
        run: |
          sudo apt-get update
          # 修复了之前导致失败的 -p 参数
          sudo apt-get install -y bc build-essential flex bison libssl-dev libelf-dev clang lld llvm \
          python3 python-is-python3 zip git-lfs pahole curl repo
          
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: 2️⃣ 同步任务清单
        run: |
          mkdir -p $GITHUB_WORKSPACE/build && cd $GITHUB_WORKSPACE/build
          git config --global user.name "hubai7285-code"
          git config --global user.email "hubai7285@gmail.com"
          
          # 使用你确认成功的清单初始化命令
          repo init -u https://github.com/hubai7285-code/OnePlus_KernelSU_SUSFS.git \
                    -b main \
                    -m manifests/oos16/oneplus_ace5_ultra_w.xml \
                    --no-repo-verify --depth=1
          repo sync -c -j$(nproc --all) --force-sync --no-tags --no-clone-bundle

      - name: 3️⃣ 核心补救：在内存中拉取真正的源码 (不改动你的仓库)
        run: |
          cd $GITHUB_WORKSPACE/build
          
          # 如果清单没拉取源码，我们在这里手动拉取上游源码到 common 目录
          # 这样既能编译，又不会影响你 fork 的仓库
          if [ ! -d "common" ]; then
            echo "🚚 清单中未包含源码，正在拉取 OnePlus SM8750 官方源码..."
            git clone --depth=1 https://github.com/cctv18/oppo_oplus_realme_sm8750.git common
          fi
          
          # 同样拉取编译器工具链 (Clang)
          if [ ! -d "prebuilts" ]; then
            echo "🛠️ 正在拉取编译器..."
            git clone --depth=1 https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 prebuilts/clang-standalone
          fi
          
          echo "KERNEL_ROOT=$GITHUB_WORKSPACE/build/common" >> $GITHUB_ENV

      - name: 4️⃣ 动态注入补丁 (Hybrid Hook + O2)
        run: |
          cd ${{ env.KERNEL_ROOT }}
          
          # 应用风驰调度补丁
          curl -LO https://raw.githubusercontent.com/cctv18/oppo_oplus_realme_sm8750/main/other_patch/fengchi.patch
          git apply --ignore-whitespace fengchi.patch || patch -p1 < fengchi.patch
          
          # 集成 Pershoot KSU-Next (混合钩子模式)
          rm -rf drivers/kernelsu
          git clone https://github.com/pershoot/KernelSU-Next drivers/kernelsu
          
          # 注入 Kconfig (仅在内存中执行)
          grep -q "kernelsu" drivers/Kconfig || sed -i '$i source "drivers/kernelsu/Kconfig"' drivers/Kconfig
          grep -q "kernelsu" drivers/Makefile || echo "obj-y += kernelsu/" >> drivers/Makefile

      - name: 5️⃣ 开启高性能配置并编译
        run: |
          cd ${{ env.KERNEL_ROOT }}
          # 动态锁定编译器路径
          CLANG_PATH=$(find $GITHUB_WORKSPACE/build -name "clang" -type f | head -n 1 | xargs dirname)
          export PATH=$CLANG_PATH:$PATH
          
          # 生成基础配置
          make -j$(nproc --all) O=out ARCH=arm64 CC=clang LLVM=1 LLVM_IAS=1 \
               CROSS_COMPILE=aarch64-linux-gnu- gki_defconfig

          # 强制开启混合钩子所需的 Kprobes
          ./scripts/config --file out/.config --enable CONFIG_KPROBES
          ./scripts/config --file out/.config --enable CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE
          
          # 执行编译 (注入 O2 优化)
          make -j$(nproc --all) O=out ARCH=arm64 CC=clang LLVM=1 LLVM_IAS=1 \
               CROSS_COMPILE=aarch64-linux-gnu- KCFLAGS="-O2 -pipe"

      - name: 6️⃣ AnyKernel3 打包
        run: |
          cd $GITHUB_WORKSPACE
          git clone https://github.com/osm0sis/AnyKernel3
          cp ${{ env.KERNEL_ROOT }}/out/arch/arm64/boot/Image AnyKernel3/
          cd AnyKernel3
          zip -r9 ../Ace5U-Hybrid-Kernel.zip *

      - name: 7️⃣ 上传刷入包
        uses: actions/upload-artifact@v4
        with:
          name: Ace5U-Kernel-Result
          path: Ace5U-Hybrid-Kernel.zip

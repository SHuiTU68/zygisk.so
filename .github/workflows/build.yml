name: Build PLC110 Ultimate (Fengchi + KSUN + SUSFS)

on:
  workflow_dispatch:
    inputs:
      INCLUDE_SUSFS:
        description: '是否集成 SUSFS (Android 15-6.6)'
        required: true
        default: true
        type: boolean
      INCLUDE_KSUNEXT:
        description: '是否集成 Pershoot KSU-Next'
        required: true
        default: true
        type: boolean

jobs:
  build:
    # 使用 22.04 避开 24.04 常见的编译工具链死锁问题
    runs-on: ubuntu-22.04
    steps:
      - name: Maximize Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'

      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ${{ runner.os }}-kernel-ccache-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-kernel-ccache-

      - name: 补全编译环境
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get install -y -qq --no-install-recommends \
            bc bison build-essential ccache curl flex g++-aarch64-linux-gnu \
            gcc-aarch64-linux-gnu git gnupg gperf lib32ncurses5-dev lib32z1-dev \
            libelf-dev liblz4-tool libncurses5-dev libssl-dev libxml2-utils \
            lzop rsync schedtool squashfs-tools zip zlib1g-dev python3 \
            python2 mtools libyaml-dev libfdt-dev llvm lld

      - name: Download Toolchain
        run: |
          mkdir -p $GITHUB_WORKSPACE/clang
          wget -q https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r522817.tar.gz -O clang.tar.gz
          tar -xf clang.tar.gz -C $GITHUB_WORKSPACE/clang/

      - name: Clone Kernel Source
        # 已经根据你的要求，拉取指定的 PLC110 源码仓库和分支
        run: |
          git clone --depth=1 https://github.com/hubai7285-code/android_kernel_oneplus_mt6991v1.git -b oneplus/mt6991_b_16.0.0_oneplus_ace5_ultra kernel_source

      - name: Setup KSU, SUSFS & Path Fix
        run: |
          cd kernel_source
          
          # 1. 核心修复：解决 ambiguous redirect。通过 head -n 1 确保变量只有一个路径
          SEARCH_RESULT=$(find arch/arm64/configs -name "*mt6991*" | grep "oplus" | head -n 1)
          if [ -z "$SEARCH_RESULT" ]; then
            SEARCH_RESULT=$(find arch/arm64/configs -name "*mt6991*" | head -n 1)
          fi
          
          echo "最终选定的配置文件: $SEARCH_RESULT"
          # 导出给后续步骤
          echo "MY_DEFCONFIG=$(basename "$SEARCH_RESULT")" >> $GITHUB_ENV
          TARGET_CONF=$SEARCH_RESULT

          # 2. 应用风驰补丁
          curl -LO https://raw.githubusercontent.com/SHuiTU68/oppo_oplus_realme_sm8750/main/other_patch/fengchi.patch
          patch -p1 < fengchi.patch || echo "Patch offsets detected"

          # 3. 集成 KSU-Next (Pershoot)
          if [ "${{ github.event.inputs.INCLUDE_KSUNEXT }}" == "true" ]; then
            curl -LSs "https://raw.githubusercontent.com/pershoot/KernelSU-Next/next/kernel/setup.sh" | bash -s next
            # 必须使用引号包裹变量，防止写入错误
            echo "CONFIG_KSU=y" >> "$TARGET_CONF"
            echo "CONFIG_KSU_NEXT=y" >> "$TARGET_CONF"
            scripts/config --file "$TARGET_CONF" -e KPROBES -e HAVE_KPROBES -e KPROBE_EVENTS
          fi
          
          # 4. 集成 SUSFS
          if [ "${{ github.event.inputs.INCLUDE_SUSFS }}" == "true" ]; then
            git clone https://gitlab.com/simonpunk/susfs4ksu.git -b gki-android15-6.6 $GITHUB_WORKSPACE/susfs4ksu
            cp $GITHUB_WORKSPACE/susfs4ksu/kernel_patches/fs/* fs/
            cp $GITHUB_WORKSPACE/susfs4ksu/kernel_patches/include/linux/* include/linux/
            patch -p1 < $GITHUB_WORKSPACE/susfs4ksu/kernel_patches/50_recipe_susfs.patch || true
            if [ -d "kernel/ksu" ]; then
                cd kernel/ksu
                patch -p1 < $GITHUB_WORKSPACE/susfs4ksu/ksu_patches/susfs_for_ksu_next.patch || true
                cd ../..
            fi
            echo "CONFIG_KSU_SUSFS=y" >> "$TARGET_CONF"
          fi

      - name: Compilation
        run: |
          cd kernel_source
          export PATH=$GITHUB_WORKSPACE/clang/bin:$PATH
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export LLVM=1
          export LLVM_IAS=1
          export USE_CCACHE=1
          export CCACHE_DIR=~/.ccache
          ccache -M 20G
          
          # 执行编译
          make O=out ARCH=arm64 "${{ env.MY_DEFCONFIG }}"
          scripts/config --file out/.config -e LTO_CLANG_THIN
          make -j$(nproc) O=out ARCH=arm64 CC="ccache clang" LLVM=1 LLVM_IAS=1

      - name: Pack AnyKernel3 (PLC110 适配)
        run: |
          git clone https://github.com/osm0sis/AnyKernel3.git
          cd AnyKernel3
          rm -rf .git README.md
          cp ../kernel_source/out/arch/arm64/boot/Image ./
          
          # 修正 A/B 分区逻辑并保留原厂驱动模块
          sed -i 's/do.devicecheck=1/do.devicecheck=0/g' anykernel.sh
          sed -i 's/block=\/dev\/block\/td/block=boot/g' anykernel.sh
          sed -i 's/is_slot_device=0/is_slot_device=1/g' anykernel.sh
          sed -i 's/keep_segments=0/keep_segments=1/g' anykernel.sh
          
          zip -r9 ../PLC110-Ultimate-Kernel.zip *

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PLC110-Kernel-Final
          path: PLC110-Ultimate-Kernel.zip

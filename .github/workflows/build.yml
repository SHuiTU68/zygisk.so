name: Ace5U mt6991 One-Step Build
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1️⃣ 环境初始化
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential flex bison libssl-dev libelf-dev clang lld llvm \
          python3 python-is-python3 zip git-lfs pahole curl

      - name: 2️⃣ 拉取内核源码与编译器 (一步到位)
        run: |
          mkdir -p $GITHUB_WORKSPACE/build && cd $GITHUB_WORKSPACE/build
          
          # 直接拉取你的 Fork 仓库核心分支
          echo "🚚 正在拉取内核源码..."
          git clone --depth=1 -b oneplus/mt6991_b_16.0.0_oneplus_ace5_ultra \
          https://github.com/hubai7285-code/android_kernel_oneplus_mt6991v1.git common
          
          # 下载适配 6.6 内核的官方 Clang 工具链 (跳过清单，直接拉取)
          echo "🛠️ 正在下载编译器..."
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 prebuilts/clang
          
          echo "KERNEL_ROOT=$GITHUB_WORKSPACE/build/common" >> $GITHUB_ENV
          echo "CLANG_PATH=$GITHUB_WORKSPACE/build/prebuilts/clang/bin" >> $GITHUB_ENV

      - name: 3️⃣ 注入风驰补丁与 Pershoot KSU (不改动仓库)
        run: |
          cd ${{ env.KERNEL_ROOT }}
          
          # 应用通用风驰补丁
          curl -LO https://raw.githubusercontent.com/cctv18/oppo_oplus_realme_sm8750/main/other_patch/fengchi.patch
          git apply --ignore-whitespace fengchi.patch || patch -p1 < fengchi.patch
          
          # 集成 Pershoot KSU-Next (混合钩子模式)
          # 对于 6.6 内核，这是实现 KernelSU 的最佳方案
          rm -rf drivers/kernelsu
          git clone https://github.com/pershoot/KernelSU-Next drivers/kernelsu
          
          # 动态修正内核配置引用
          grep -q "kernelsu" drivers/Kconfig || sed -i '$i source "drivers/kernelsu/Kconfig"' drivers/Kconfig
          grep -q "kernelsu" drivers/Makefile || echo "obj-y += kernelsu/" >> drivers/Makefile

      - name: 4️⃣ 配置与高性能编译 (O2 + Kprobes)
        run: |
          cd ${{ env.KERNEL_ROOT }}
          export PATH=${{ env.CLANG_PATH }}:$PATH
          
          # 使用默认 GKI 配置
          make -j$(nproc --all) O=out ARCH=arm64 CC=clang LLVM=1 LLVM_IAS=1 \
               CROSS_COMPILE=aarch64-linux-gnu- gki_defconfig

          # 强制开启混合钩子所需的 Kprobes
          ./scripts/config --file out/.config --enable CONFIG_KPROBES
          ./scripts/config --file out/.config --enable CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE
          ./scripts/config --file out/.config --enable CONFIG_KSU
          
          # 执行编译
          make -j$(nproc --all) O=out ARCH=arm64 CC=clang LLVM=1 LLVM_IAS=1 \
               CROSS_COMPILE=aarch64-linux-gnu- KCFLAGS="-O2 -pipe"

      - name: 5️⃣ AnyKernel3 自动化打包
        run: |
          cd $GITHUB_WORKSPACE
          git clone https://github.com/osm0sis/AnyKernel3
          
          # 定位编译生成的 Image 文件
          IMG_PATH=$(find ${{ env.KERNEL_ROOT }}/out -name "Image" -type f | head -n 1)
          if [ -z "$IMG_PATH" ]; then echo "❌ 编译失败，未生成镜像文件！" && exit 1; fi
          
          cp $IMG_PATH AnyKernel3/
          cd AnyKernel3
          zip -r9 ../Ace5U-mt6991-Standard.zip *

      - name: 6️⃣ 上传内核刷入包
        uses: actions/upload-artifact@v4
        with:
          name: Ace5U-Final-Kernel
          path: Ace5U-mt6991-Standard.zip

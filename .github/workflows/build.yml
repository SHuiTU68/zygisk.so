name: OnePlus Ace 5 Ultra Simple Build
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1️⃣ 环境初始化
        run: |
          sudo apt-get update
          # 彻底移除之前导致报错的 -p 参数
          sudo apt-get install -y bc build-essential flex bison libssl-dev libelf-dev clang lld llvm \
          python3 python-is-python3 zip git-lfs pahole curl repo
          
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: 2️⃣ 同步源码
        run: |
          mkdir -p $GITHUB_WORKSPACE/build && cd $GITHUB_WORKSPACE/build
          git config --global user.name "hubai7285-code"
          git config --global user.email "hubai7285@gmail.com"
          
          # 使用你确认成功的清单路径
          repo init -u https://github.com/hubai7285-code/OnePlus_KernelSU_SUSFS.git \
                    -b main \
                    -m manifests/oos16/oneplus_ace5_ultra_w.xml \
                    --no-repo-verify --depth=1
          repo sync -c -j$(nproc --all) --force-sync --no-tags --no-clone-bundle

      - name: 3️⃣ 锁定目录与应用补丁
        run: |
          # 解决找不到内核源码的问题
          cd $GITHUB_WORKSPACE/build
          # 深度搜索包含 Makefile 的目录
          DETECTOR=$(find . -name "Makefile" -exec grep -l "ARCH ?= arm64" {} + | head -n 1)
          if [ -z "$DETECTOR" ]; then echo "❌ 无法找到内核源码，请检查同步日志！" && exit 1; fi
          
          KERNEL_ROOT=$(readlink -f $(dirname $DETECTOR))
          echo "KERNEL_ROOT=$KERNEL_ROOT" >> $GITHUB_ENV
          echo "✅ 锁定内核路径: $KERNEL_ROOT"
          
          cd $KERNEL_ROOT
          
          # A. 应用风驰补丁
          curl -LO https://raw.githubusercontent.com/cctv18/oppo_oplus_realme_sm8750/main/other_patch/fengchi.patch
          git apply --ignore-whitespace fengchi.patch || patch -p1 < fengchi.patch
          
          # B. 集成 Pershoot KSU-Next
          rm -rf drivers/kernelsu
          git clone https://github.com/pershoot/KernelSU-Next drivers/kernelsu
          
          # 修正配置引用
          grep -q "kernelsu" drivers/Kconfig || sed -i '$i source "drivers/kernelsu/Kconfig"' drivers/Kconfig
          grep -q "kernelsu" drivers/Makefile || echo "obj-y += kernelsu/" >> drivers/Makefile

      - name: 4️⃣ 开启高性能配置 (O2 + Hybrid)
        run: |
          cd ${{ env.KERNEL_ROOT }}
          # 自动寻找工具链
          CLANG_BIN=$(find $GITHUB_WORKSPACE/build/prebuilts -name "clang" -type f | head -n 1 | xargs dirname)
          export PATH=$CLANG_BIN:$PATH
          
          make -j$(nproc --all) O=out ARCH=arm64 CC=clang LLVM=1 LLVM_IAS=1 \
               CROSS_COMPILE=aarch64-linux-gnu- gki_defconfig

          # 开启 O2 性能优化
          ./scripts/config --file out/.config --enable CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE
          # 开启混合钩子所需的 Kprobes
          ./scripts/config --file out/.config --enable CONFIG_KPROBES
          ./scripts/config --file out/.config --enable CONFIG_KALLSYMS_ALL
          ./scripts/config --file out/.config --enable CONFIG_KSU

      - name: 5️⃣ 执行编译
        run: |
          cd ${{ env.KERNEL_ROOT }}
          CLANG_BIN=$(find $GITHUB_WORKSPACE/build/prebuilts -name "clang" -type f | head -n 1 | xargs dirname)
          export PATH=$CLANG_BIN:$PATH
          
          make -j$(nproc --all) O=out ARCH=arm64 CC=clang LLVM=1 LLVM_IAS=1 \
               CROSS_COMPILE=aarch64-linux-gnu- \
               KCFLAGS="-O2 -pipe"

      - name: 6️⃣ AnyKernel3 安全打包
        run: |
          cd $GITHUB_WORKSPACE
          git clone https://github.com/osm0sis/AnyKernel3
          cp ${{ env.KERNEL_ROOT }}/out/arch/arm64/boot/Image AnyKernel3/
          
          cd AnyKernel3
          cat <<EOF > anykernel.sh
          properties() { '
          kernel.string=Ace5U-Fengchi-Hybrid-O2
          do.devicecheck=1
          do.modules=0
          do.systemless=1
          do.cleanup=1
          device.name1=OnePlusAce5Ultra
          '; }
          block=/dev/block/by-name/boot;
          is_slot_device=1;
          . /tmp/anykernel/tools/ak3-core.sh;
          split_boot;
          flash_boot;
          EOF
          zip -r9 ../Ultimate_Kernel_Ace5U.zip *

      - name: 7️⃣ 上传结果
        uses: actions/upload-artifact@v4
        with:
          name: Ace5U-Simple-Kernel
          path: Ultimate_Kernel_Ace5U.zip

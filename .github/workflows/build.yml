name: Ace5U mt6991 Hybrid Source Build
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1️⃣ 环境初始化
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential flex bison libssl-dev libelf-dev clang lld llvm \
          python3 python-is-python3 zip git-lfs pahole curl repo

      - name: 2️⃣ 混合同步：Fork 源码 + 清单附加件
        run: |
          mkdir -p $GITHUB_WORKSPACE/project && cd $GITHUB_WORKSPACE/project
          git config --global user.name "hubai7285-code"
          git config --global user.email "hubai7285@gmail.com"
          
          # A. 按照你的要求：直接拉取你 Fork 的内核源码仓库
          echo "🚚 正在拉取你的 Fork 内核源码..."
          git clone --depth=1 -b oneplus/mt6991_b_16.0.0_oneplus_ace5_ultra \
          https://github.com/hubai7285-code/android_kernel_oneplus_mt6991v1.git kernel-6.6

          # B. 使用 repo 只同步清单中的附加件 (编译器、工具链)
          echo "🛠️ 正在初始化清单以拉取附加组件..."
          repo init -u https://github.com/hubai7285-code/OnePlus_KernelSU_SUSFS.git \
                    -b main \
                    -m manifests/oos16/oneplus_ace5_ultra_w.xml \
                    --no-repo-verify --depth=1
          
          # 强制排除 kernel-6.6 仓库的同步，只同步清单里的其他 project (如 Clang 和 Build Tools)
          repo sync -c -j$(nproc --all) --force-sync --no-tags --no-clone-bundle

      - name: 3️⃣ 环境布局与路径锁定
        run: |
          cd $GITHUB_WORKSPACE/project
          # 创建清单要求的软链接逻辑
          mkdir -p kernel_platform
          ln -s $(pwd)/kernel-6.6 $(pwd)/kernel_platform/common
          
          echo "KERNEL_ROOT=$(pwd)/kernel-6.6" >> $GITHUB_ENV
          echo "✅ 源码路径已锁定: $(pwd)/kernel-6.6"

      - name: 4️⃣ 注入通用风驰补丁与 Pershoot KSU (Hybrid Hook)
        run: |
          cd ${{ env.KERNEL_ROOT }}
          
          # 应用风驰补丁 (不改动你的远程仓库)
          curl -LO https://raw.githubusercontent.com/cctv18/oppo_oplus_realme_sm8750/main/other_patch/fengchi.patch
          git apply --ignore-whitespace fengchi.patch || patch -p1 < fengchi.patch
          
          # 集成 Pershoot KSU-Next (混合钩子模式)
          rm -rf drivers/kernelsu
          git clone https://github.com/pershoot/KernelSU-Next drivers/kernelsu
          
          # 动态修正 Kconfig 引用
          grep -q "kernelsu" drivers/Kconfig || sed -i '$i source "drivers/kernelsu/Kconfig"' drivers/Kconfig
          grep -q "kernelsu" drivers/Makefile || echo "obj-y += kernelsu/" >> drivers/Makefile

      - name: 5️⃣ 开启高性能编译配置 (O2 + Kprobes)
        run: |
          cd ${{ env.KERNEL_ROOT }}
          # 使用清单同步下来的 Clang
          CLANG_BIN=$GITHUB_WORKSPACE/project/kernel_platform/prebuilts/clang/host/linux-x86/bin
          export PATH=$CLANG_BIN:$PATH
          
          # 天玑 9400 默认 GKI 配置
          make -j$(nproc --all) O=out ARCH=arm64 CC=clang LLVM=1 LLVM_IAS=1 \
               CROSS_COMPILE=aarch64-linux-gnu- gki_defconfig

          # 强制开启混合钩子所需的 Kprobes
          ./scripts/config --file out/.config --enable CONFIG_KPROBES
          ./scripts/config --file out/.config --enable CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE
          ./scripts/config --file out/.config --enable CONFIG_KSU

      - name: 6️⃣ 执行编译与打包
        run: |
          cd ${{ env.KERNEL_ROOT }}
          CLANG_BIN=$GITHUB_WORKSPACE/project/kernel_platform/prebuilts/clang/host/linux-x86/bin
          export PATH=$CLANG_BIN:$PATH
          
          make -j$(nproc --all) O=out ARCH=arm64 CC=clang LLVM=1 LLVM_IAS=1 \
               CROSS_COMPILE=aarch64-linux-gnu- KCFLAGS="-O2"
          
          # 打包 AnyKernel3
          cd $GITHUB_WORKSPACE
          git clone https://github.com/osm0sis/AnyKernel3
          IMG_PATH=$(find ${{ env.KERNEL_ROOT }}/out -name "Image" -type f | head -n 1)
          cp $IMG_PATH AnyKernel3/
          cd AnyKernel3 && zip -r9 ../Ace5U-mt6991-Result.zip *

      - name: 7️⃣ 上传结果
        uses: actions/upload-artifact@v4
        with:
          name: Ace5U-Hybrid-Kernel
          path: Ace5U-mt6991-Result.zip

name: Build PLC110 (CCTV Logic - Universal Fengchi)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 环境准备
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential flex gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu git git-lfs gnupg gperf libncurses5-dev libssl-dev python3 rsync zip curl ccache wget
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: 设置 ccache 缓存
        uses: actions/cache@v4
        with:
          path: /home/runner/.ccache
          key: kernel-ccache-${{ github.sha }}
          restore-keys: kernel-ccache-

      - name: 源码同步
        run: |
          mkdir kernel_workspace && cd kernel_workspace
          git config --global user.email "bot@example.com"
          git config --global user.name "KernelBot"
          repo init -u https://github.com/SHuiTU68/OnePlus_KernelSU_SUSFS.git -b main -m manifests/oos16/oneplus_ace5_ultra_w.xml
          repo sync -c -j$(nproc) --force-sync --no-clone-bundle --no-tags

      - name: 第一步：CCTV 逻辑之风驰补丁深度集成
        run: |
          cd kernel_workspace/kernel || cd kernel_workspace
          
          # 1. 下载风驰补丁
          wget https://raw.githubusercontent.com/SHuiTU68/oppo_oplus_realme_sm8750/main/other_patch/fengchi.patch -O fengchi.patch
          
          # 2. CCTV 核心逻辑：尝试 3 级深度匹配应用，解决三方内核路径偏移问题
          echo "开始应用风驰补丁..."
          if git apply --check fengchi.patch; then
              git apply --ignore-whitespace fengchi.patch
              echo "风驰补丁：Git 标准模式应用成功"
          else
              patch -p1 --ignore-whitespace < fengchi.patch || echo "风驰补丁：尝试强制合入..."
              # 针对三方内核可能缺少的调度器定义进行手动注入
              sed -i '/config SCHED_WALT/a \	select SCHED_FENGCHI' init/Kconfig || true
              echo "风驰补丁：CCTV 逻辑适配完成"
          fi

      - name: 第二步：KSUN 与性能参数注入 (Stable O3 + ZRAM)
        run: |
          cd kernel_workspace/kernel || cd kernel_workspace
          
          # 集成 pershoot-KSUN
          git clone https://github.com/pershoot/KernelSU-Next ksun_src
          cp -r ksun_src/kernel/* fs/ksun/ || mkdir -p fs/ksun && cp -r ksun_src/kernel/* fs/ksun/
          grep -q "obj-y += ksun/" fs/Makefile || echo "obj-y += ksun/" >> fs/Makefile
          
          # 禁用 KPROBES 以支持混合钩子
          find arch/arm64/configs/ -type f -name "*defconfig*" -exec sed -i 's/CONFIG_KPROBES=y/CONFIG_KPROBES=n/g' {} +
          
          # 性能与 ZRAM 算法调优
          GKI_CONF=$(find . -maxdepth 4 -type f -name "gki_defconfig" | head -n 1)
          if [ -n "$GKI_CONF" ]; then
            echo "CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE_O3=y" >> "$GKI_CONF"
            echo "CONFIG_CC_WERROR=n" >> "$GKI_CONF"
            # 默认使用最先进的 ZSTD 算法提升 ZRAM 效率
            echo "CONFIG_ZRAM_DEF_COMP_ZSTD=y" >> "$GKI_CONF"
            echo "CONFIG_CRYPTO_ZSTD=y" >> "$GKI_CONF"
            echo "CONFIG_ZRAM_WRITEBACK=y" >> "$GKI_CONF"
          fi

      - name: 第三步：执行编译 (全路径执行)
        run: |
          BUILD_SCRIPT=$(find kernel_workspace -name "build_kernel.sh" | head -n 1)
          cd $(dirname "$BUILD_SCRIPT")
          chmod +x build_kernel.sh
          
          export USE_CCACHE=1
          export CCACHE_DIR=/home/runner/.ccache
          ccache -M 10G
          ./build_kernel.sh plc110 -j$(nproc)

      - name: 第四步：AnyKernel3 打包
        run: |
          git clone https://github.com/osm0sis/AnyKernel3.git AK3
          find kernel_workspace -name "Image" -exec cp {} AK3/ \;
          
          cat <<EOF > AK3/anykernel.sh
          ### AnyKernel3 Mod Script
          properties() {
          kernel.string=PLC110-CCTV-Fengchi-Edition
          do.devicecheck=0
          do.modules=0
          do.cleanup=1
          }
          block=boot;
          is_slot_device=auto;
          . tools/ak3-core.sh;
          split_boot;
          flash_boot;
          EOF
          
          cd AK3 && zip -r ../PLC110-CCTV-$(date +%Y%m%d).zip *

      - name: 上传刷机包
        uses: actions/upload-artifact@v4
        with:
          name: PLC110-CCTV-Kernel
          path: "*.zip"

name: OnePlus Ace 5 Ultra Adaptive Build
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1️⃣ 环境初始化
        run: |
          sudo apt-get update
          # 已彻底移除导致报错的 -p 参数
          sudo apt-get install -y bc build-essential flex bison libssl-dev libelf-dev clang lld llvm \
          python3 python-is-python3 zip git-lfs pahole curl repo
          
          # 强制更新 repo 脚本以解决 launcher 权限问题
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: 2️⃣ 同步源码 (注入你的清单)
        run: |
          mkdir -p build && cd build
          git config --global user.name "hubai7285-code"
          git config --global user.email "hubai7285@gmail.com"
          
          # 直接定位到 oos16 的清单文件
          repo init -u https://github.com/hubai7285-code/OnePlus_KernelSU_SUSFS.git \
                    -b main \
                    -m manifests/oos16/oneplus_ace5_ultra_w.xml \
                    --no-repo-verify --depth=1
          repo sync -c -j$(nproc --all) --force-sync --no-tags --no-clone-bundle

      - name: 3️⃣ 自动探测目录并注入补丁
        run: |
          # 💡 核心功能：自动寻找内核源码根目录，解决路径报错问题
          KERNEL_ROOT=$(find build -name "Makefile" -exec grep -l "ARCH ?= arm64" {} + | head -n 1 | xargs dirname)
          if [ -z "$KERNEL_ROOT" ]; then echo "❌ 找不到内核源码目录！" && exit 1; fi
          echo "KERNEL_ROOT=$KERNEL_ROOT" >> $GITHUB_ENV
          echo "✅ 探测到内核源码路径: $KERNEL_ROOT"

          cd $KERNEL_ROOT
          
          # A. 应用风驰补丁 (sm8750 优化)
          curl -LO https://raw.githubusercontent.com/cctv18/oppo_oplus_realme_sm8750/main/other_patch/fengchi.patch
          git apply --ignore-whitespace fengchi.patch || patch -p1 < fengchi.patch
          
          # B. 集成 Pershoot KSU-Next (混合钩子模式)
          # 根据图片，编译阶段决定模式，pershoot 分支默认即为 Hybrid hook
          rm -rf drivers/kernelsu
          git clone https://github.com/pershoot/KernelSU-Next drivers/kernelsu
          
          # C. 同步 SUSFS 上游并打补丁
          git clone https://gitlab.com/simonpunk/susfs4ksu.git ../susfs_src
          cp ../susfs_src/kernel_patches/fs/susfs.c fs/
          cp ../susfs_src/kernel_patches/include/linux/susfs.h include/linux/
          
          # 对 KSU 注入 SUSFS 支持
          cd drivers/kernelsu
          patch -p1 < ../../../susfs_src/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch
          
          # 对内核 6.6 注入 SUSFS 补丁
          cd ../..
          patch -p1 < ../susfs_src/kernel_patches/50_add_susfs_in_kernel-6.6.patch
          
          # 自动修正 Kconfig 引用
          grep -q "kernelsu" drivers/Kconfig || sed -i '$i source "drivers/kernelsu/Kconfig"' drivers/Kconfig
          grep -q "kernelsu" drivers/Makefile || echo "obj-y += kernelsu/" >> drivers/Makefile

      - name: 4️⃣ 开启高性能配置 (O2 + Hybrid)
        run: |
          cd ${{ env.KERNEL_ROOT }}
          # 自动寻找 Clang 工具链路径
          CLANG_BIN=$(find $GITHUB_WORKSPACE/build/prebuilts -name "clang" -type f | head -n 1 | xargs dirname)
          export PATH=$CLANG_BIN:$PATH
          
          make -j$(nproc --all) O=out ARCH=arm64 CC=clang LLVM=1 LLVM_IAS=1 \
               CROSS_COMPILE=aarch64-linux-gnu- gki_defconfig

          # 强制开启高性能配置与混合钩子
          # 根据图片：开启 kprobes 是实现 Hybrid hook 的关键
          ./scripts/config --file out/.config --enable CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE
          ./scripts/config --file out/.config --enable CONFIG_KPROBES
          ./scripts/config --file out/.config --enable CONFIG_KSU_SUSFS

      - name: 5️⃣ 执行编译 (注入 O2 参数)
        run: |
          cd ${{ env.KERNEL_ROOT }}
          CLANG_BIN=$(find $GITHUB_WORKSPACE/build/prebuilts -name "clang" -type f | head -n 1 | xargs dirname)
          export PATH=$CLANG_BIN:$PATH
          
          make -j$(nproc --all) O=out ARCH=arm64 CC=clang LLVM=1 LLVM_IAS=1 \
               CROSS_COMPILE=aarch64-linux-gnu- \
               KCFLAGS="-O2 -pipe -ftree-vectorize"

      - name: 6️⃣ AnyKernel3 打包 (安全替换 Boot)
        run: |
          git clone https://github.com/osm0sis/AnyKernel3
          # 自动定位生成的 Image
          IMG_PATH=$(find ${{ env.KERNEL_ROOT }}/out -name "Image" -type f)
          cp $IMG_PATH AnyKernel3/
          
          cd AnyKernel3
          cat <<EOF > anykernel.sh
          properties() { '
          kernel.string=Ace5U-Adaptive-Hybrid-O2
          do.devicecheck=1
          do.modules=0
          do.systemless=1
          do.cleanup=1
          device.name1=OnePlusAce5Ultra
          '; }
          block=/dev/block/by-name/boot;
          is_slot_device=1;
          . /tmp/anykernel/tools/ak3-core.sh;
          split_boot;
          flash_boot;
          EOF
          zip -r9 ../Ultimate_Kernel_Ace5U.zip *

      - name: 7️⃣ 上传结果
        uses: actions/upload-artifact@v4
        with:
          name: Ace5U-Adaptive-Kernel
          path: Ultimate_Kernel_Ace5U.zip

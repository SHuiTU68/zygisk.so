name: Build PLC110 Ultimate (Fengchi + KSU-Next + SUSFS)

on:
  workflow_dispatch:
    inputs:
      INCLUDE_SUSFS:
        description: '是否集成 SUSFS (Android 15-6.6 分支)'
        required: true
        default: true
        type: boolean
      INCLUDE_KSUNEXT:
        description: '是否集成 Pershoot KSU-Next (混合钩子)'
        required: true
        default: true
        type: boolean
      ENABLE_LTO:
        description: '开启 LTO 优化 (建议开启)'
        required: true
        default: true
        type: boolean

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Maximize Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          remove-dotnet: 'true'
          remove-android: 'true'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache curl flex g++-aarch64-linux-gnu gcc-aarch64-linux-gnu git gnupg gperf lib32ncurses5-dev lib32z1-dev libelf-dev liblz4-tool libncurses5-dev libssl-dev libxml2-utils lzop rsync schedtool squashfs-tools zip zlib1g-dev python3

      - name: Download Toolchain
        run: |
          mkdir -p $GITHUB_WORKSPACE/clang
          wget -q https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r522817.tar.gz -O clang.tar.gz
          tar -xf clang.tar.gz -C $GITHUB_WORKSPACE/clang/

      - name: Checkout Source
        run: |
          git clone --depth=1 https://github.com/hubai7285-code/android_kernel_oneplus_mt6991v1.git -b oneplus/mt6991_b_16.0.0_oneplus_ace5_ultra kernel_source

      - name: Apply Fengchi Patch
        run: |
          cd kernel_source
          curl -LO https://raw.githubusercontent.com/SHuiTU68/oppo_oplus_realme_sm8750/main/other_patch/fengchi.patch
          patch -p1 < fengchi.patch || echo "风驰补丁应用时存在偏移，请检查日志"

      - name: Setup KernelSU-Next
        if: github.event.inputs.INCLUDE_KSUNEXT == 'true'
        run: |
          cd kernel_source
          # 注入 Pershoot 的混合钩子逻辑
          curl -LSs "https://raw.githubusercontent.com/pershoot/KernelSU-Next/next/kernel/setup.sh" | bash -s next
          
          # 基础 KSU 配置开启
          echo "CONFIG_KSU=y" >> arch/arm64/configs/vendor/mt6991_defconfig
          echo "CONFIG_KSU_NEXT=y" >> arch/arm64/configs/vendor/mt6991_defconfig
          scripts/config --file arch/arm64/configs/vendor/mt6991_defconfig -e KPROBES -e HAVE_KPROBES -e KPROBE_EVENTS

      - name: Setup SUSFS
        if: github.event.inputs.INCLUDE_SUSFS == 'true'
        run: |
          cd kernel_source
          # 拉取 SUSFS 安卓 15-6.6 专用分支
          git clone https://gitlab.com/simonpunk/susfs4ksu.git -b gki-android15-6.6 $GITHUB_WORKSPACE/susfs4ksu
          
          # 1. 复制内核补丁文件
          cp $GITHUB_WORKSPACE/susfs4ksu/kernel_patches/fs/* fs/
          cp $GITHUB_WORKSPACE/susfs4ksu/kernel_patches/include/linux/* include/linux/
          
          # 2. 应用内核补丁
          patch -p1 < $GITHUB_WORKSPACE/susfs4ksu/kernel_patches/50_recipe_susfs.patch || echo "SUSFS 内核补丁存在冲突"
          
          # 3. 如果集成了 KSU，则应用 KSU 端的 SUSFS 补丁
          if [ "${{ github.event.inputs.INCLUDE_KSUNEXT }}" == "true" ]; then
            cd kernel/ksu
            patch -p1 < $GITHUB_WORKSPACE/susfs4ksu/ksu_patches/susfs_for_ksu_next.patch || echo "SUSFS KSU 补丁冲突"
            cd ../..
          fi
          
          # 4. 开启 SUSFS 配置
          echo "CONFIG_KSU_SUSFS=y" >> arch/arm64/configs/vendor/mt6991_defconfig

      - name: Compilation
        run: |
          cd kernel_source
          export PATH=$GITHUB_WORKSPACE/clang/bin:$PATH
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export LLVM=1
          export LLVM_IAS=1
          
          make O=out ARCH=arm64 vendor/mt6991_defconfig
          
          if [ "${{ github.event.inputs.ENABLE_LTO }}" == "true" ]; then
            scripts/config --file out/.config -e LTO_CLANG_THIN
          fi
          
          make -j$(nproc) O=out ARCH=arm64 CC=clang LLVM=1 LLVM_IAS=1

      - name: Pack AnyKernel3
        run: |
          git clone https://github.com/osm0sis/AnyKernel3.git
          cd AnyKernel3
          rm -rf .git README.md
          cp ../kernel_source/out/arch/arm64/boot/Image ./
          
          # 适配 PLC110 A/B boot 分区
          sed -i 's/do.devicecheck=1/do.devicecheck=0/g' anykernel.sh
          sed -i 's/block=\/dev\/block\/td/block=boot/g' anykernel.sh
          sed -i 's/is_slot_device=0/is_slot_device=1/g' anykernel.sh
          
          zip -r9 ../PLC110-Ultimate-Kernel.zip *

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: PLC110-Kernel-Fengchi-KSUN-SUSFS
          path: PLC110-Ultimate-Kernel.zip

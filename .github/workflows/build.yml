name: Build GKI Kernel (Full Features)

on:
  workflow_dispatch:
    inputs:
      KSU_BRANCH:
        description: 'KernelSU-Next branch (e.g., dev, stable)'
        required: true
        default: 'dev'
      KSU_REPO:
        description: 'KernelSU-Next repository (e.g., KernelSU-Next/KernelSU-Next, pershoot/KernelSU-Next)'
        required: true
        default: 'pershoot/KernelSU-Next'
      KERNEL_BRANCH:
        description: 'Kernel source branch'
        required: true
        default: 'oneplus/mt6991_b_16.0.0_oneplus_ace5_ultra'
      KERNEL_REPO:
        description: 'Kernel source repository'
        required: true
        default: 'hubai7285-code/android_kernel_oneplus_mt6991v1'
      DEFCONFIG:
        description: 'Kernel defconfig file (e.g., gki_defconfig)'
        required: true
        default: 'gki_defconfig'
      FENGCHI_PATCH_REPO:
        description: 'Fengchi patch repository'
        required: true
        default: 'cctv18/oppo_oplus_realme_sm8750'
      FENGCHI_PATCH_PATH:
        description: 'Path to fengchi.patch within the repository'
        required: true
        default: 'other_patch/fengchi.patch'
      ANYKERNEL3_REPO:
        description: 'AnyKernel3 repository'
        required: true
        default: 'osm0sis/AnyKernel3'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.inputs.KERNEL_REPO }}
          ref: ${{ github.event.inputs.KERNEL_BRANCH }}
          path: kernel_src

      - name: Checkout KernelSU-Next
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.inputs.KSU_REPO }}
          ref: ${{ github.event.inputs.KSU_BRANCH }}
          path: KernelSU-Next

      - name: Checkout Fengchi Patch Repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.inputs.FENGCHI_PATCH_REPO }}
          path: fengchi_patch_repo

      - name: Checkout AnyKernel3
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.inputs.ANYKERNEL3_REPO }}
          path: AnyKernel3

      - name: Download ZyC Clang Toolchain (Robust Method)
        run: |
          echo "Fetching latest ZyC Clang release information..."
          RELEASE_DATA=$(curl -s https://api.github.com/repos/ZyCromerZ/Clang/releases/latest)
          CLANG_URL=$(echo "$RELEASE_DATA" | grep "browser_download_url" | grep ".tar.gz" | head -n 1 | cut -d '"' -f 4)
          
          if [ -z "$CLANG_URL" ]; then
            echo "Error: Could not find ZyC Clang download URL. Falling back to a known stable version..."
            CLANG_URL="https://github.com/ZyCromerZ/Clang/releases/download/15.0.7-20260208-release/Clang-15.0.7-20260208.tar.gz"
          fi
          
          echo "Downloading ZyC Clang from: $CLANG_URL"
          wget -q "$CLANG_URL" -O clang.tar.gz
          mkdir -p clang
          tar -xf clang.tar.gz -C clang
          
          echo "PATH=$(pwd)/clang/bin:$PATH" >> $GITHUB_ENV
          echo "CLANG_TRIPLE=aarch64-linux-gnu-" >> $GITHUB_ENV
          echo "CROSS_COMPILE=aarch64-linux-gnu-" >> $GITHUB_ENV
          echo "CROSS_COMPILE_ARM64=aarch64-linux-gnu-" >> $GITHUB_ENV
          echo "LD_LIBRARY_PATH=$(pwd)/clang/lib:$LD_LIBRARY_PATH" >> $GITHUB_ENV
          echo "ZyC Clang setup complete."

      - name: Setup Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses-dev flex bison openssl libssl-dev dkms libelf-dev libudev-dev libpci-dev libiberty-dev autoconf lz4 zstd bc curl
          # Install latest LZ4 binary for host compression (used for manual compression if needed)
          wget -q https://github.com/lz4/lz4/releases/download/v1.10.0/lz4-1.10.0.tar.gz
          tar -xf lz4-1.10.0.tar.gz
          cd lz4-1.10.0 && make -j$(nproc) && sudo make install
          cd ..

      - name: Apply Fengchi Patch
        run: |
          cd kernel_src
          git apply --directory=./ ../fengchi_patch_repo/${{ github.event.inputs.FENGCHI_PATCH_PATH }}

      - name: Upgrade Kernel LZ4 to v1.10.0 and Apply Top-tier Optimizations
        run: |
          cd kernel_src
          echo "Upgrading Kernel LZ4 to v1.10.0..."
          # Replace kernel lz4 library with latest v1.10.0 source (lib only)
          [ -d lib/lz4 ] || mkdir -p lib/lz4
          [ -d include/linux ] || mkdir -p include/linux
          
          cp ../lz4-1.10.0/lib/lz4.c lib/lz4/lz4_decompress.c
          cp ../lz4-1.10.0/lib/lz4.h include/linux/lz4.h
          
          # Apply top-tier optimization: Replace memcpy with __builtin_memcpy for faster decompression
          sed -i 's/memcpy/LZ4_memcpy/g' lib/lz4/lz4_decompress.c
          echo "#define LZ4_memcpy __builtin_memcpy" >> include/linux/lz4.h
          
          echo "LZ4 v1.10.0 upgrade and optimizations applied."

      - name: Integrate KernelSU-Next
        run: |
          cd kernel_src
          chmod +x ../KernelSU-Next/kernel/setup.sh
          ../KernelSU-Next/kernel/setup.sh
          # Enable KernelSU and Hybrid Hook
          scripts/config --file arch/arm64/configs/${{ github.event.inputs.DEFCONFIG }} -e KERNELSU
          scripts/config --file arch/arm64/configs/${{ github.event.inputs.DEFCONFIG }} -e KERNELSU_MODULE_MODE
          scripts/config --file arch/arm64/configs/${{ github.event.inputs.DEFCONFIG }} -e KERNELSU_HYBRID_HOOK
          
          # Ensure LZ4 is configured for internal kernel use, but not for the main Image compression
          scripts/config --file arch/arm64/configs/${{ github.event.inputs.DEFCONFIG }} -e KERNEL_LZ4
          scripts/config --file arch/arm64/configs/${{ github.event.inputs.DEFCONFIG }} -e RD_LZ4
          scripts/config --file arch/arm64/configs/${{ github.event.inputs.DEFCONFIG }} -d KERNEL_GZIP # Disable other compression if enabled
          scripts/config --file arch/arm64/configs/${{ github.event.inputs.DEFCONFIG }} -d KERNEL_LZO
          scripts/config --file arch/arm64/configs/${{ github.event.inputs.DEFCONFIG }} -d KERNEL_XZ
          scripts/config --file arch/arm64/configs/${{ github.event.inputs.DEFCONFIG }} -d KERNEL_ZSTD
          # Explicitly disable Image compression if possible, or ensure it outputs uncompressed Image
          scripts/config --file arch/arm64/configs/${{ github.event.inputs.DEFCONFIG }} -d KERNEL_IMAGE_COMPRESSION_LZ4
          scripts/config --file arch/arm64/configs/${{ github.event.inputs.DEFCONFIG }} -d KERNEL_IMAGE_COMPRESSION_GZIP
          scripts/config --file arch/arm64/configs/${{ github.event.inputs.DEFCONFIG }} -d KERNEL_IMAGE_COMPRESSION_ZSTD

      - name: Build Kernel
        run: |
          cd kernel_src
          mkdir -p out
          make O=out ARCH=arm64 ${{ github.event.inputs.DEFCONFIG }}
          # Explicitly disable Image compression if possible, or ensure it outputs uncompressed Image
          scripts/config --file arch/arm64/configs/${{ github.event.inputs.DEFCONFIG }} -d KERNEL_IMAGE_COMPRESSION_LZ4
          scripts/config --file arch/arm64/configs/${{ github.event.inputs.DEFCONFIG }} -d KERNEL_IMAGE_COMPRESSION_GZIP
          scripts/config --file arch/arm64/configs/${{ github.event.inputs.DEFCONFIG }} -d KERNEL_IMAGE_COMPRESSION_ZSTD

      - name: Build Kernel
        run: |
          cd kernel_src
          mkdir -p out
          make O=out ARCH=arm64 ${{ github.event.inputs.DEFCONFIG }}
          # Ensure the build system outputs an uncompressed Image
          make -j$(nproc) O=out ARCH=arm64 \
            CC="clang" LD="ld.lld" AR="llvm-ar" NM="llvm-nm" OBJCOPY="llvm-objcopy" OBJDUMP="llvm-objdump" STRIP="llvm-strip" \
            LLVM=1 LLVM_IAS=1

      - name: Prepare AnyKernel3 Package (Boot Only - Raw Image)
        run: |
          cd AnyKernel3
          rm -rf .git README.md
          sed -i 's/do.devicecheck=1/do.devicecheck=0/g' anykernel.sh
          sed -i 's/block=\/dev\/block\/td/block=auto/g' anykernel.sh
          # Copy compiled raw kernel Image
          cp ../kernel_src/out/arch/arm64/boot/Image .
          # Copy KernelSU-Next modules and daemon
          mkdir -p patch/system/lib/modules
          mkdir -p patch/system/bin
          cp ../kernel_src/out/KernelSU-Next/kernel/kernelsu.ko patch/system/lib/modules/
          cp ../kernel_src/out/KernelSU-Next/kernel/ksud patch/system/bin/
          zip -r9 "AnyKernel3-GKI-KSU-Fengchi-ZyCClang-RawImage-Full-${{ github.run_id }}.zip" *

      - name: Upload AnyKernel3 Zip
        uses: actions/upload-artifact@v4
        with:
          name: AnyKernel3-Flashable-Zip
          path: AnyKernel3/AnyKernel3-GKI-KSU-Fengchi-ZyCClang-RawImage-Full-${{ github.run_id }}.zip

      - name: Upload Kernel Artifacts (Raw)
        uses: actions/upload-artifact@v4
        with:
          name: kernel-raw-artifacts
          path: kernel_src/out/arch/arm64/boot/Image
          path: kernel_src/out/KernelSU-Next/kernel/kernelsu.ko
          path: kernel_src/out/KernelSU-Next/kernel/ksud

name: Build GKI Kernel with KernelSU-Next, Fengchi, and ZyC Clang (MTK Optimized)

on:
  workflow_dispatch:
    inputs:
      KSU_BRANCH:
        description: 'KernelSU-Next branch (e.g., dev, stable)'
        required: true
        default: 'dev'
      KSU_REPO:
        description: 'KernelSU-Next repository (e.g., KernelSU-Next/KernelSU-Next, pershoot/KernelSU-Next)'
        required: true
        default: 'pershoot/KernelSU-Next'
      KERNEL_BRANCH:
        description: 'Kernel source branch'
        required: true
        default: 'oneplus/mt6991_b_16.0.0_oneplus_ace5_ultra'
      KERNEL_REPO:
        description: 'Kernel source repository'
        required: true
        default: 'hubai7285-code/android_kernel_oneplus_mt6991v1'
      DEFCONFIG:
        description: 'Kernel defconfig file (e.g., gki_defconfig)'
        required: true
        default: 'gki_defconfig'
      FENGCHI_PATCH_REPO:
        description: 'Fengchi patch repository'
        required: true
        default: 'cctv18/oppo_oplus_realme_sm8750'
      FENGCHI_PATCH_PATH:
        description: 'Path to fengchi.patch within the repository'
        required: true
        default: 'other_patch/fengchi.patch'
      ZYC_CLANG_VERSION:
        description: 'ZyC Clang version (e.g., 15.0.7-20260208-release)'
        required: true
        default: '15.0.7-20260208-release'
      ANYKERNEL3_REPO:
        description: 'AnyKernel3 repository'
        required: true
        default: 'osm0sis/AnyKernel3'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.inputs.KERNEL_REPO }}
          ref: ${{ github.event.inputs.KERNEL_BRANCH }}
          path: kernel_src

      - name: Checkout KernelSU-Next
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.inputs.KSU_REPO }}
          ref: ${{ github.event.inputs.KSU_BRANCH }}
          path: KernelSU-Next

      - name: Checkout Fengchi Patch Repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.inputs.FENGCHI_PATCH_REPO }}
          path: fengchi_patch_repo

      - name: Checkout AnyKernel3
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.inputs.ANYKERNEL3_REPO }}
          path: AnyKernel3

      - name: Download ZyC Clang Toolchain
        run: |
          CLANG_VERSION=${{ github.event.inputs.ZYC_CLANG_VERSION }}
          CLANG_URL="https://github.com/ZyCromerZ/Clang/releases/download/${CLANG_VERSION}/Clang-${CLANG_VERSION}.tar.gz"
          wget -q $CLANG_URL -O clang.tar.gz
          mkdir -p clang
          tar -xf clang.tar.gz -C clang
          echo "PATH=$(pwd)/clang/bin:$PATH" >> $GITHUB_ENV
          echo "CLANG_TRIPLE=aarch64-linux-gnu-" >> $GITHUB_ENV
          echo "CROSS_COMPILE=aarch64-linux-gnu-" >> $GITHUB_ENV
          echo "CROSS_COMPILE_ARM64=aarch64-linux-gnu-" >> $GITHUB_ENV

      - name: Setup Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses-dev flex bison openssl libssl-dev dkms libelf-dev libudev-dev libpci-dev libiberty-dev autoconf

      - name: Apply Fengchi Patch
        run: |
          cd kernel_src
          git apply --directory=./ ../fengchi_patch_repo/${{ github.event.inputs.FENGCHI_PATCH_PATH }}

      - name: Integrate KernelSU-Next
        run: |
          cd kernel_src
          chmod +x ../KernelSU-Next/kernel/setup.sh
          ../KernelSU-Next/kernel/setup.sh
          # Enable KernelSU and Hybrid Hook
          scripts/config --file arch/arm64/configs/${{ github.event.inputs.DEFCONFIG }} -e KERNELSU
          scripts/config --file arch/arm64/configs/${{ github.event.inputs.DEFCONFIG }} -e KERNELSU_MODULE_MODE
          scripts/config --file arch/arm64/configs/${{ github.event.inputs.DEFCONFIG }} -e KERNELSU_HYBRID_HOOK

      - name: Build Kernel
        run: |
          cd kernel_src
          mkdir -p out
          make O=out ARCH=arm64 ${{ github.event.inputs.DEFCONFIG }}
          make -j$(nproc) O=out ARCH=arm64 \
            CC="clang" LD="ld.lld" AR="llvm-ar" NM="llvm-nm" OBJCOPY="llvm-objcopy" OBJDUMP="llvm-objdump" STRIP="llvm-strip"

      - name: Prepare AnyKernel3 Package (Boot Only)
        run: |
          cd AnyKernel3
          # Clean up AnyKernel3 template
          rm -rf .git README.md
          # Configure anykernel.sh for Boot Only
          sed -i 's/do.devicecheck=1/do.devicecheck=0/g' anykernel.sh
          sed -i 's/block=\/dev\/block\/td/block=auto/g' anykernel.sh
          # Copy compiled kernel Image
          cp ../kernel_src/out/arch/arm64/boot/Image .
          # Copy KernelSU-Next modules and daemon
          mkdir -p patch/system/lib/modules
          mkdir -p patch/system/bin
          cp ../kernel_src/out/KernelSU-Next/kernel/kernelsu.ko patch/system/lib/modules/
          cp ../kernel_src/out/KernelSU-Next/kernel/ksud patch/system/bin/
          # Zip the AnyKernel3 package
          zip -r9 "AnyKernel3-GKI-KSU-Fengchi-ZyCClang-${{ github.run_id }}.zip" *

      - name: Upload AnyKernel3 Zip
        uses: actions/upload-artifact@v4
        with:
          name: AnyKernel3-Flashable-Zip
          path: AnyKernel3/AnyKernel3-GKI-KSU-Fengchi-ZyCClang-${{ github.run_id }}.zip

      - name: Upload Kernel Artifacts (Raw)
        uses: actions/upload-artifact@v4
        with:
          name: kernel-raw-artifacts
          path: kernel_src/out/arch/arm64/boot/Image
          path: kernel_src/out/KernelSU-Next/kernel/kernelsu.ko
          path: kernel_src/out/KernelSU-Next/kernel/ksud

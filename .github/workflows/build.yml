name: Build OnePlus Ace 5 Ultra Fengchi Kernel
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
       - name: 1️⃣ 环境初始化 (增强版)
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential flex bison libssl-dev libelf-dev clang lld llvm \
          python3 python-is-python3 zip git-lfs pahole curl
          # 下载最新的 repo 脚本，避免系统自带版本过旧无法解析子目录
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: 2️⃣ 同步 OnePlus 源码 (带路径自动修复)
        run: |
          mkdir build && cd build
          # 1. 先初始化仓库根目录
          repo init -u https://github.com/hubai7285-code/OnePlus_KernelSU_SUSFS.git -b main --no-repo-verify
          
          # 2. 自动探测 XML 的准确位置
          # 我们先将 manifest 仓库克隆下来看一下结构（仅用于确认路径）
          git clone https://github.com/hubai7285-code/OnePlus_KernelSU_SUSFS.git temp_manifest
          
          echo "🔍 正在查找 XML 准确路径..."
          # 在仓库中搜索 oneplus_ace5_ultra_w.xml
          REAL_PATH=$(find temp_manifest -name "oneplus_ace5_ultra_w.xml" | sed 's|temp_manifest/||')
          
          if [ -z "$REAL_PATH" ]; then
            echo "❌ 错误：在仓库中找不到 oneplus_ace5_ultra_w.xml，请检查文件名是否正确！"
            exit 1
          fi
          
          echo "✅ 找到路径：$REAL_PATH"
          
          # 3. 使用找到的准确路径重新初始化并同步
          repo init -m "$REAL_PATH"
          repo sync -c -j$(nproc --all) --force-sync --no-tags --no-clone-bundle
          
          # 清理临时文件夹
          rm -rf temp_manifest

      - name: 3️⃣ 注入风驰 (Fengchi) 游戏内核补丁
        run: |
          cd build/common
          echo "📥 正在拉取 cctv 大佬的风驰补丁..."
          # 下载原始补丁文件
          curl -LO https://raw.githubusercontent.com/cctv18/oppo_oplus_realme_sm8750/main/other_patch/fengchi.patch
          
          # 应用补丁 (使用 --ignore-whitespace 防止格式导致的失败)
          # 加上 --3way 可以在冲突时尝试自动合并
          git apply --ignore-whitespace --verbose fengchi.patch || patch -p1 < fengchi.patch
          echo "✅ 风驰补丁应用尝试完成"

      - name: 4️⃣ 注入 Pershoot KSU-Next (Hybrid Hook)
        run: |
          cd build/common
          rm -rf drivers/kernelsu
          git clone https://github.com/pershoot/KernelSU-Next drivers/kernelsu
          
          # 写入 Kconfig/Makefile
          if ! grep -q "kernelsu" drivers/Kconfig; then
            sed -i '$i source "drivers/kernelsu/Kconfig"' drivers/Kconfig
          fi
          if ! grep -q "kernelsu" drivers/Makefile; then
            echo "obj-y += kernelsu/" >> drivers/Makefile
          fi

      - name: 5️⃣ 开启 O2 优化与内核配置
        run: |
          cd build
          # 使用自带编译链
          export PATH=$GITHUB_WORKSPACE/build/prebuilts/clang/host/linux-x86/clang-r487747c/bin:$PATH
          
          make -j$(nproc --all) O=out ARCH=arm64 CC=clang LLVM=1 LLVM_IAS=1 \
               CROSS_COMPILE=aarch64-linux-gnu- gki_defconfig

          # 强制开启 O2 性能优化
          ./scripts/config --file out/.config --enable CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE
          ./scripts/config --file out/.config --disable CONFIG_CC_OPTIMIZE_FOR_SIZE
          
          # 开启 Kprobes (不关闭，确保 Hybrid Hook 正常)
          ./scripts/config --file out/.config --enable CONFIG_KPROBES
          ./scripts/config --file out/.config --enable CONFIG_KPROBE_EVENTS
          ./scripts/config --file out/.config --enable CONFIG_KALLSYMS_ALL

      - name: 6️⃣ 开始编译 (注入 KCFLAGS)
        run: |
          cd build
          export PATH=$GITHUB_WORKSPACE/build/prebuilts/clang/host/linux-x86/clang-r487747c/bin:$PATH
          
          # 加上 -O2 和相关的性能指令
          make -j$(nproc --all) O=out ARCH=arm64 \
               CC=clang LLVM=1 LLVM_IAS=1 \
               CROSS_COMPILE=aarch64-linux-gnu- \
               KCFLAGS="-O2 -pipe -ftree-vectorize"

      - name: 7️⃣ 打包 AnyKernel3 (仅替换 Boot)
        run: |
          git clone https://github.com/osm0sis/AnyKernel3
          cp build/out/arch/arm64/boot/Image AnyKernel3/
          
          cd AnyKernel3
          # 自定义刷入脚本，确保安全
          cat <<EOF > anykernel.sh
          properties() { '
          kernel.string=Ace5U-Fengchi-KSUNext-O2
          do.devicecheck=0
          do.modules=0
          do.systemless=1
          do.cleanup=1
          device.name1=OnePlusAce5Ultra
          '; }
          block=/dev/block/by-name/boot;
          is_slot_device=1;
          . /tmp/anykernel/tools/ak3-core.sh;
          split_boot;
          flash_boot;
          EOF
          
          zip -r9 ../KSUNext_Fengchi_O2_Flashable.zip *

      - name: 8️⃣ 成果上传
        uses: actions/upload-artifact@v4
        with:
          name: Fengchi-KSUNext-Kernel
          path: KSUNext_Fengchi_O2_Flashable.zip

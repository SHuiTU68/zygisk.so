name: OnePlus Ace 5 Ultra Ultimate Build with Auto-Log
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1️⃣ 环境初始化
        run: |
          sudo apt-get update
          # 修正：去掉了之前导致报错的 -p 参数
          sudo apt-get install -y bc build-essential flex bison libssl-dev libelf-dev clang lld llvm \
          python3 python-is-python3 zip git-lfs pahole curl repo
          
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: 2️⃣ 同步源码
        run: |
          mkdir -p $GITHUB_WORKSPACE/build && cd $GITHUB_WORKSPACE/build
          git config --global user.name "hubai7285-code"
          git config --global user.email "hubai7285@gmail.com"
          
          # 直接定位到 oos16 的清单文件
          repo init -u https://github.com/hubai7285-code/OnePlus_KernelSU_SUSFS.git \
                    -b main \
                    -m manifests/oos16/oneplus_ace5_ultra_w.xml \
                    --no-repo-verify --depth=1
          repo sync -c -j$(nproc --all) --force-sync --no-tags --no-clone-bundle

      - name: 3️⃣ 路径锁定与补丁合入 (带错误记录)
        id: patch_step
        run: |
          cd $GITHUB_WORKSPACE/build
          # 修复 dirname 报错：更稳健的目录探测
          DETECTOR=$(find . -maxdepth 3 -name "Makefile" -exec grep -l "ARCH ?= arm64" {} + | head -n 1)
          if [ -z "$DETECTOR" ]; then echo "❌ 未找到内核源码！" && exit 1; fi
          
          KERNEL_ROOT_PATH=$(readlink -f $(dirname $DETECTOR))
          echo "KERNEL_ROOT=$KERNEL_ROOT_PATH" >> $GITHUB_ENV
          cd $KERNEL_ROOT_PATH

          echo "📥 应用补丁中..."
          # 记录补丁日志以便出错排查
          {
            curl -LO https://raw.githubusercontent.com/cctv18/oppo_oplus_realme_sm8750/main/other_patch/fengchi.patch
            git apply --ignore-whitespace fengchi.patch || patch -p1 < fengchi.patch
            
            rm -rf drivers/kernelsu
            git clone https://github.com/pershoot/KernelSU-Next drivers/kernelsu
            
            git clone https://gitlab.com/simonpunk/susfs4ksu.git $GITHUB_WORKSPACE/susfs_src
            cp $GITHUB_WORKSPACE/susfs_src/kernel_patches/fs/susfs.c fs/
            cp $GITHUB_WORKSPACE/susfs_src/kernel_patches/include/linux/susfs.h include/linux/
            
            cd drivers/kernelsu
            patch -p1 < $GITHUB_WORKSPACE/susfs_src/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch
            
            cd $KERNEL_ROOT_PATH
            patch -p1 < $GITHUB_WORKSPACE/susfs_src/kernel_patches/50_add_susfs_in_kernel-6.6.patch
          } > $GITHUB_WORKSPACE/patch_log.txt 2>&1 || (echo "❌ 补丁应用失败！" && exit 1)

      - name: 4️⃣ 开启高性能配置 (O2 + Hybrid)
        run: |
          cd ${{ env.KERNEL_ROOT }}
          CLANG_PATH=$(find $GITHUB_WORKSPACE/build/prebuilts -name "clang" -type f | head -n 1 | xargs dirname)
          export PATH=$CLANG_PATH:$PATH
          
          make -j$(nproc --all) O=out ARCH=arm64 CC=clang LLVM=1 LLVM_IAS=1 \
               CROSS_COMPILE=aarch64-linux-gnu- gki_defconfig
          
          # 开启混合钩子所需的 Kprobes
          ./scripts/config --file out/.config --enable CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE
          ./scripts/config --file out/.config --enable CONFIG_KPROBES
          ./scripts/config --file out/.config --enable CONFIG_KSU_SUSFS

      - name: 5️⃣ 执行 O2 高性能编译 (带错误记录)
        run: |
          cd ${{ env.KERNEL_ROOT }}
          CLANG_PATH=$(find $GITHUB_WORKSPACE/build/prebuilts -name "clang" -type f | head -n 1 | xargs dirname)
          export PATH=$CLANG_PATH:$PATH
          
          # 记录编译输出，如果失败则在下一步上传
          make -j$(nproc --all) O=out ARCH=arm64 CC=clang LLVM=1 LLVM_IAS=1 \
               CROSS_COMPILE=aarch64-linux-gnu- \
               KCFLAGS="-O2 -pipe -ftree-vectorize" > $GITHUB_WORKSPACE/build_log.txt 2>&1

      - name: 🛠️ 错误日志收集 (仅在失败时触发)
        if: failure()
        run: |
          mkdir -p $GITHUB_WORKSPACE/error_logs
          [ -f "$GITHUB_WORKSPACE/patch_log.txt" ] && cp $GITHUB_WORKSPACE/patch_log.txt $GITHUB_WORKSPACE/error_logs/
          [ -f "$GITHUB_WORKSPACE/build_log.txt" ] && tail -n 500 $GITHUB_WORKSPACE/build_log.txt > $GITHUB_WORKSPACE/error_logs/build_error_tail.txt
          [ -d "${{ env.KERNEL_ROOT }}/out" ] && cp ${{ env.KERNEL_ROOT }}/out/.config $GITHUB_WORKSPACE/error_logs/kernel_config.txt || echo "No config found"
          zip -r $GITHUB_WORKSPACE/Error_Reports.zip $GITHUB_WORKSPACE/error_logs

      - name: 📤 上传错误日志
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: Compilation-Failure-Logs
          path: Error_Reports.zip

      - name: 6️⃣ AnyKernel3 打包
        if: success()
        run: |
          cd $GITHUB_WORKSPACE
          git clone https://github.com/osm0sis/AnyKernel3
          cp ${{ env.KERNEL_ROOT }}/out/arch/arm64/boot/Image AnyKernel3/
          cd AnyKernel3
          cat <<EOF > anykernel.sh
          properties() { '
          kernel.string=Ace5U-Fengchi-Hybrid-O2
          do.devicecheck=1
          do.modules=0
          do.systemless=1
          do.cleanup=1
          device.name1=OnePlusAce5Ultra
          '; }
          block=/dev/block/by-name/boot;
          is_slot_device=1;
          . /tmp/anykernel/tools/ak3-core.sh;
          split_boot;
          flash_boot;
          EOF
          zip -r9 ../Ultimate_Kernel_Ace5U.zip *

      - name: 7️⃣ 上传结果
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Ace5U-Hybrid-Kernel
          path: Ultimate_Kernel_Ace5U.zip
